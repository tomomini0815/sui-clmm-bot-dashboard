services:
  - type: web
    name: sui-clmm-bot-backend
    env: node
    region: oregon
    plan: standard
    rootDir: bot_v2
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PRIVATE_KEY
        sync: false
      - key: SUI_RPC_URL
        value: https://fullnode.mainnet.sui.io:443
      - key: POOL_OBJECT_ID
        value: 0xb8d7d9e66a60c239e7a60110efcf8de6c705580ed924d0dde141f4a0e2c90105
      - key: LP_AMOUNT_USDC
        value: 0.05
      - key: RANGE_WIDTH
        value: 0.05
      - key: HEDGE_RATIO
        value: 0.5
      - key: MONITOR_INTERVAL_MS
        value: 10000
      - key: COOLDOWN_PERIOD_MS
        value: 60000

