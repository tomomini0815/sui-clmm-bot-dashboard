# fly.toml app configuration file generated for sui-clmm-bot-backend
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sui-clmm-bot-backend'
primary_region = 'nrt'

[build]
  dockerfile = "Dockerfile.fly"

[env]
  NODE_ENV = "production"
  SUI_RPC_URL = "https://fullnode.mainnet.sui.io:443"
  POOL_OBJECT_ID = "0xb8d7d9e66a60c239e7a60110efcf8de6c705580ed924d0dde141f4a0e2c90105"
  LP_AMOUNT_USDC = "50"
  RANGE_WIDTH = "0.05"
  HEDGE_RATIO = "0.5"
  MONITOR_INTERVAL_MS = "10000"
  COOLDOWN_PERIOD_MS = "60000"

[http_service]
  internal_port = 3002
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[http_service.concurrency]
  type = "connections"
  hard_limit = 25
  soft_limit = 20

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
